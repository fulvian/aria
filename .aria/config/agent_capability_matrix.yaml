agents:
  - name: aria-conductor
    type: primary
    allowed_tools:
      - aria-memory__wiki_update_tool
      - aria-memory__wiki_recall_tool
      - aria-memory__wiki_show_tool
      - aria-memory__wiki_list_tool
      - aria-memory__forget
      - aria-memory__stats
      - aria-memory__hitl_ask
      - aria-memory__hitl_list_pending
      - aria-memory__hitl_cancel
      - aria-memory__hitl_approve
      - sequential-thinking__*
      - spawn-subagent
    mcp_dependencies:
      - aria-memory
      - aria-mcp-proxy
    delegation_targets:
      - search-agent
      - workspace-agent
      - productivity-agent
      - trader-agent
      - traveller-agent
    hitl_triggers:
      - destructive
      - costly
      - oauth_consent
    intent_categories: []
    max_tools: 20
    max_spawn_depth: 2

  - name: search-agent
    type: worker
    allowed_tools:
      - searxng-script__*
      - tavily-mcp__*
      - exa-script__*
      - brave-mcp__*
      - reddit-search__*
      - scientific-papers-mcp__*
      - aria-memory__wiki_update_tool
      - aria-memory__wiki_recall_tool
      - fetch__*
    mcp_dependencies:
      - aria-mcp-proxy
      - aria-memory
    delegation_targets: []
    hitl_triggers: []
    intent_categories:
      - general/news
      - academic
      - social
      - deep_scrape
    max_tools: 20
    max_spawn_depth: 0

  - name: workspace-agent
    type: worker
    allowed_tools:
      - google_workspace__*
      - aria-memory__wiki_update_tool
      - aria-memory__wiki_recall_tool
      - hitl-queue__ask
    mcp_dependencies:
      - aria-mcp-proxy
      - aria-memory
    delegation_targets: []
    hitl_triggers: []
    intent_categories: []
    max_tools: 20
    max_spawn_depth: 0

  - name: productivity-agent
    type: worker
    allowed_tools:
      - markitdown-mcp__*
      - filesystem__*
      - google_workspace__*
      - aria-memory__wiki_update_tool
      - aria-memory__wiki_recall_tool
      - aria-memory__wiki_show_tool
      - aria-memory__wiki_list_tool
      - hitl-queue__ask
      - fetch__*
      - sequential-thinking__*
      - spawn-subagent
    mcp_dependencies:
      - aria-mcp-proxy
      - aria-memory
    delegation_targets:
      - workspace-agent
    hitl_triggers: []
    intent_categories: []
    max_tools: 20
    max_spawn_depth: 1

  - name: trader-agent
    type: worker
    description: Agente di analisi finanziaria — stock, ETF, options, macro, sentiment, crypto, commodity. Consulente di analisi, NON execution bot.
    allowed_tools:
      - aria-mcp-proxy__search_tools
      - aria-mcp-proxy__call_tool
      - aria-memory__wiki_update_tool
      - aria-memory__wiki_recall_tool
      - aria-memory__wiki_show_tool
      - aria-memory__wiki_list_tool
      - hitl-queue__ask
      - sequential-thinking__*
    mcp_dependencies:
      - aria-mcp-proxy
      - aria-memory
    delegation_targets: []
    hitl_triggers:
      - trading_recommendation_formal
      - exposure_gt_50k
    intent_categories:
      - finance.stock-analysis
      - finance.options-analysis
      - finance.macro-analysis
      - finance.sentiment
      - finance.crypto
      - finance.commodity
      - finance.comparison
      - finance.brief
    max_tools: 20
    max_spawn_depth: 0

  - name: traveller-agent
    type: worker
    description: Agente di pianificazione viaggi — destinazione, trasporto, alloggio, attività, itinerario, budget. Consulente travel, NON booking executor.
    allowed_tools:
      - aria-mcp-proxy__search_tools
      - aria-mcp-proxy__call_tool
      - aria-memory__wiki_update_tool
      - aria-memory__wiki_recall_tool
      - aria-memory__wiki_show_tool
      - aria-memory__wiki_list_tool
      - hitl-queue__ask
      - sequential-thinking__*
      - spawn-subagent
      # Travel backend tools (accessible via aria-mcp-proxy__call_tool)
      - airbnb__*
      - osm-mcp__*
      - aria-amadeus-mcp__*
      - booking__*
    mcp_dependencies:
      - aria-mcp-proxy
      - aria-memory
    delegation_targets:
      - productivity-agent
      - search-agent
    hitl_triggers:
      - destructive
      - costly
    intent_categories:
      - travel.destination
      - travel.transport
      - travel.accommodation
      - travel.activity
      - travel.itinerary
      - travel.budget
      - travel.brief
    max_tools: 20
    max_spawn_depth: 1
