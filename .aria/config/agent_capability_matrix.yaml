agents:
  - name: aria-conductor
    type: primary
    allowed_tools:
      - aria-memory_wiki_update_tool
      - aria-memory_wiki_recall_tool
      - aria-memory_wiki_show_tool
      - aria-memory_wiki_list_tool
      - aria-memory_forget
      - aria-memory_stats
      - aria-memory_hitl_ask
      - aria-memory_hitl_list_pending
      - aria-memory_hitl_cancel
      - aria-memory_hitl_approve
      - sequential-thinking_*
      - spawn-subagent
    mcp_dependencies:
      - aria-memory
      - aria-mcp-proxy
    delegation_targets:
      - search-agent
      - workspace-agent
      - productivity-agent
      - trader-agent
    hitl_triggers:
      - destructive
      - costly
      - oauth_consent
    intent_categories: []
    max_tools: 20
    max_spawn_depth: 2

  - name: search-agent
    type: worker
    allowed_tools:
      - searxng-script_*
      - tavily-mcp_*
      - exa-script_*
      - brave-mcp_*
      - reddit-search_*
      - scientific-papers-mcp_*
      - aria-memory_wiki_update_tool
      - aria-memory_wiki_recall_tool
      - fetch_*
    mcp_dependencies:
      - aria-mcp-proxy
      - aria-memory
    delegation_targets: []
    hitl_triggers: []
    intent_categories:
      - general/news
      - academic
      - social
      - deep_scrape
    max_tools: 20
    max_spawn_depth: 0

  - name: workspace-agent
    type: worker
    allowed_tools:
      - google_workspace_*
      - google-workspace_*
      - aria-memory_wiki_update_tool
      - aria-memory_wiki_recall_tool
      - hitl-queue_ask
    mcp_dependencies:
      - aria-mcp-proxy
      - aria-memory
    delegation_targets: []
    hitl_triggers: []
    intent_categories: []
    max_tools: 20
    max_spawn_depth: 0

  - name: productivity-agent
    type: worker
    allowed_tools:
      - markitdown-mcp_*
      - filesystem_*
      - google_workspace_*
      - google-workspace_*
      - aria-memory_wiki_update_tool
      - aria-memory_wiki_recall_tool
      - aria-memory_wiki_show_tool
      - aria-memory_wiki_list_tool
      - hitl-queue_ask
      - fetch_*
      - sequential-thinking_*
      - spawn-subagent
    mcp_dependencies:
      - aria-mcp-proxy
      - aria-memory
    delegation_targets:
      - workspace-agent
    hitl_triggers: []
    intent_categories: []
    max_tools: 20
    max_spawn_depth: 1

  - name: trader-agent
    type: worker
    description: Agente di analisi finanziaria — stock, ETF, options, macro, sentiment, crypto, commodity. Consulente di analisi, NON execution bot.
    allowed_tools:
      - financekit-mcp_*
      - mcp-fredapi_*
      - alpaca-mcp_*
      - financial-modeling-prep-mcp_*
      - helium-mcp_*
      - aria-mcp-proxy_search_tools
      - aria-mcp-proxy_call_tool
      - aria-memory_wiki_update_tool
      - aria-memory_wiki_recall_tool
      - aria-memory_wiki_show_tool
      - aria-memory_wiki_list_tool
      - hitl-queue_ask
      - sequential-thinking_*
    mcp_dependencies:
      - aria-mcp-proxy
      - aria-memory
    delegation_targets: []
    hitl_triggers:
      - trading_recommendation_formal
      - exposure_gt_50k
    intent_categories:
      - finance.stock-analysis
      - finance.options-analysis
      - finance.macro-analysis
      - finance.sentiment
      - finance.crypto
      - finance.commodity
      - finance.comparison
      - finance.brief
    max_tools: 20
    max_spawn_depth: 0
