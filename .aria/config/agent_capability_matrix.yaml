agents:
  - name: aria-conductor
    type: primary
    allowed_tools:
      - aria-memory__wiki_update_tool
      - aria-memory__wiki_recall_tool
      - aria-memory__wiki_show_tool
      - aria-memory__wiki_list_tool
      - aria-memory__forget
      - aria-memory__stats
      - aria-memory__hitl_ask
      - aria-memory__hitl_list_pending
      - aria-memory__hitl_cancel
      - aria-memory__hitl_approve
      - sequential-thinking__*
      - spawn-subagent
    mcp_dependencies:
      - aria-memory
      - aria-mcp-proxy
    delegation_targets:
      - search-agent
      - workspace-agent
      - productivity-agent
    hitl_triggers:
      - destructive
      - costly
      - oauth_consent
    intent_categories: []
    max_tools: 20
    max_spawn_depth: 2

  - name: search-agent
    type: worker
    allowed_tools:
      - searxng-script__search
      - tavily-mcp__search
      - exa-script__search
      - brave-mcp__web_search
      - brave-mcp__news_search
      - reddit-search__search
      - reddit-search__search_subreddit
      - reddit-search__get_post
      - reddit-search__get_subreddit_posts
      - reddit-search__get_user
      - reddit-search__get_user_posts
      - scientific-papers-mcp__search_papers
      - scientific-papers-mcp__fetch_content
      - scientific-papers-mcp__fetch_latest
      - scientific-papers-mcp__list_categories
      - scientific-papers-mcp__fetch_top_cited
      - aria-memory__wiki_update_tool
      - aria-memory__wiki_recall_tool
      - fetch__fetch
    mcp_dependencies:
      - aria-mcp-proxy
      - aria-memory
    delegation_targets: []
    hitl_triggers: []
    intent_categories:
      - general/news
      - academic
      - social
      - deep_scrape
    max_tools: 20
    max_spawn_depth: 0

  - name: workspace-agent
    type: worker
    allowed_tools:
      - google_workspace__gmail.*
      - google_workspace__calendar.*
      - google_workspace__drive.*
      - google_workspace__docs.*
      - google_workspace__sheets.*
      - aria-memory__wiki_update_tool
      - aria-memory__wiki_recall_tool
      - hitl-queue__ask
    mcp_dependencies:
      - aria-mcp-proxy
      - aria-memory
    delegation_targets: []
    hitl_triggers: []
    intent_categories: []
    max_tools: 20
    max_spawn_depth: 0

  - name: productivity-agent
    type: worker
    allowed_tools:
      - markitdown-mcp__convert_to_markdown
      - filesystem__read
      - filesystem__list_directory
      - aria-memory__wiki_update_tool
      - aria-memory__wiki_recall_tool
      - aria-memory__wiki_show_tool
      - aria-memory__wiki_list_tool
      - hitl-queue__ask
      - fetch__fetch
      - sequential-thinking__*
      - spawn-subagent
    mcp_dependencies:
      - aria-mcp-proxy
      - aria-memory
    delegation_targets:
      - workspace-agent
    hitl_triggers: []
    intent_categories: []
    max_tools: 20
    max_spawn_depth: 1
